<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hệ thống Thời khóa biểu</title>

  <!-- CSS của bạn -->
  <link rel="stylesheet" href="style.css" />

  <!-- Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- SQL.js + KVDB (B1: SQLite trong trình duyệt) -->
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.9.0/dist/sql-wasm.js"></script>
  <script src="kvdb.js"></script>

  <!-- App -->
  <script defer src="app.js"></script>
</head>

<body>
  <div class="app-nav" style="padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <button class="btn" data-page="khoi" onclick="loadPage('khoi')">Khối học</button>
    <button class="btn" data-page="lop" onclick="loadPage('lop')">Lớp học</button>
    <button class="btn" data-page="giaovien" onclick="loadPage('giaovien')">Giáo viên</button>
    <button class="btn" data-page="mon" onclick="loadPage('mon')">Môn học</button>
    <button class="btn" data-page="tietchuan" onclick="loadPage('tietchuan')">Tiết chuẩn</button>
    <button class="btn" data-page="phong" onclick="loadPage('phong')">Phòng học</button>
    <button class="btn" data-page="pccm" onclick="loadPage('pccm')">Phân công</button>
    <button class="btn primary" onclick="openTKBPlanner()">Sắp xếp TKB</button>

    <span style="flex:1"></span>

    <div class="school-switcher nav-switcher" onclick="showSchoolSwitcher()" title="Đổi trường">
      <span id="schoolBadgeText" style="font-weight:700;"></span>
      <span class="chevron">▾</span>
    </div>
  </div>

  <div id="section-content" style="padding:0 16px 16px 16px;">
    <div style="padding:16px;border:1px solid #e5e5e5;border-radius:10px;background:#fff;">
      Đang tải dữ liệu…
    </div>
  </div>

  <!-- Modal dùng chung -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button class="btn primary" onclick="saveData()">Lưu</button>
        <button class="btn" onclick="closeModal()">Đóng</button>
      </div>
    </div>
  </div>
</body>
</html>
